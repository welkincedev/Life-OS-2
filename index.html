<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeOS — Your Personal Life Dashboard</title>
    <meta name="description" content="LifeOS is your all-in-one personal life dashboard for habits, journaling, finances, and wellness.">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-950 text-white font-['Inter'] min-h-screen flex items-center justify-center">

    <!-- Landing / Splash Page -->
    <main class="text-center px-6">
        <div class="mb-8 animate-pulse">
            <span class="text-6xl">🧬</span>
        </div>
        <h1 class="text-5xl md:text-7xl font-black tracking-tight mb-4 bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">
            LifeOS
        </h1>
        <p class="text-gray-400 text-lg md:text-xl max-w-md mx-auto mb-10">
            Your personal operating system for a better life.
        </p>
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="login.html" class="px-8 py-3 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-semibold hover:scale-105 transition-transform shadow-lg shadow-indigo-500/25">
                Get Started
            </a>
            <a href="dashboard.html" class="px-8 py-3 rounded-xl border border-gray-700 text-gray-300 font-semibold hover:bg-gray-800 transition-colors">
                Go to Dashboard
            </a>
        </div>
        <p class="text-gray-600 text-sm mt-12">&copy; 2026 LifeOS. Built for you.</p>
    </main>

    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
